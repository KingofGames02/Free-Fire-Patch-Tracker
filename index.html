<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Patch Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@900&display=swap');

        :root {
            --bg: #040d1f;
            --card-bg: #071932;
            --accent: #4a78c2;
            --green: #00e676;
            --green-dark: #00c853;
            --red: #ff5252;
            --text: #e0e8f2;
            --muted: #9cb8d6;
            --radius: 16px;
            --border: rgba(255, 255, 255, 0.09);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Cairo', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 10px;
        }

        .loader-container {
            position: fixed; inset: 0; background: rgba(4, 13, 31, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; flex-direction: column; gap: 20px;
            transition: opacity 0.4s ease;
        }
        .loader {
            width: 50px; height: 50px; border: 5px solid var(--border);
            border-top-color: var(--green); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loader-text { 
            color: var(--green); font-weight: 800; letter-spacing: 2px; 
            animation: pulseGlow 1.5s infinite; font-size: 1.1rem; text-transform: uppercase;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulseGlow { 0% { opacity: 0.7; } 50% { opacity: 1; text-shadow: 0 0 10px var(--green); } 100% { opacity: 0.7; } }
        .hidden { display: none !important; }

        .header-container { text-align: center; margin-bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        .main-title {
            font-size: clamp(1.4rem, 5vw, 2.4rem); font-weight: 900; margin-bottom: 5px;
            background: linear-gradient(to right, #e0e8f2, var(--green), #e0e8f2);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; text-transform: uppercase;
            letter-spacing: 1px; animation: titleShine 3s linear infinite;
        }
        @keyframes titleShine { to { background-position: 200% center; } }
        
        .sub-title {
            font-size: 0.8rem; font-weight: 700; color: #FFD700; letter-spacing: 1px;
            animation: glowEffect 1.5s ease-in-out infinite alternate; text-transform: uppercase;
        }
        @keyframes glowEffect { from { text-shadow: 0 0 5px #FFD700; } to { text-shadow: 0 0 15px #FFD700; } }

        .lang-toggle-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px;
            padding: 8px 16px; margin-top: 15px; cursor: pointer; color: var(--accent); font-weight: 700;
            font-size: 0.8rem; transition: all 0.3s;
        }
        .lang-toggle-btn:hover { border-color: var(--accent); background: rgba(74, 120, 194, 0.1); transform: translateY(-2px); }

        .card {
            background: linear-gradient(145deg, var(--card-bg), #051329);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 30px; width: 100%; max-width: 480px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); position: relative;
        }

        .ff-logo {
            width: 180px; height: auto; margin-bottom: 10px; display: block;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        .update-display {
            display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 25px; position: relative;
        }

        .version-tag {
            font-size: 4rem; font-weight: 900; color: #fff; line-height: 1; font-family: 'Lexend', sans-serif;
            text-shadow: 0 0 20px rgba(0, 230, 118, 0.4); margin: 5px 0;
        }

        .nav-arrows {
            display: flex; flex-direction: column; gap: 10px; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
        }
        html[dir="rtl"] .nav-arrows { left: auto; right: 0; }

        .btn-arrow {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted);
            width: 40px; height: 40px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s;
        }
        .btn-arrow:hover { background: rgba(0, 230, 118, 0.1); color: var(--green); border-color: var(--green); transform: scale(1.1); }

        .countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .time-box {
            background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border);
            border-radius: 12px; padding: 15px 5px; text-align: center;
        }
        .time-val { font-size: 1.6rem; font-weight: 900; color: #fff; display: block; font-family: 'Poppins', sans-serif; }
        .time-label { font-size: 0.65rem; color: var(--muted); font-weight: 800; text-transform: uppercase; }

        .download-section {
            display: none; flex-direction: column; gap: 12px; margin-bottom: 25px; width: 100%;
        }
        .btn-download {
            background: rgba(0, 230, 118, 0.1); border: 1px solid var(--green); color: var(--green);
            padding: 14px 15px; border-radius: 12px; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s;
            text-transform: uppercase; text-decoration: none; font-size: 0.95rem; width: 100%;
        }
        .btn-download:hover { background: var(--green); color: #000; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 230, 118, 0.3); }

        .local-info {
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 12px;
            padding: 15px; text-align: center; color: var(--muted); font-size: 0.85rem; font-weight: 600;
        }
        .highlight { color: var(--green); font-weight: 800; display: block; margin-top: 5px; font-size: 1rem; }

        .note-box {
            max-width: 480px; width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border); border-radius: 12px; margin-top: 25px;
            text-align: center; font-size: 0.8rem; color: var(--muted); line-height: 1.5;
        }

        .social-footer { display: flex; gap: 12px; justify-content: center; margin-top: 25px; }
        .social-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted);
            width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center;
            justify-content: center; transition: all 0.3s; text-decoration: none;
        }
        .social-btn:hover { color: #fff; transform: translateY(-3px); border-color: var(--accent); }
        .social-btn svg { width: 22px; height: 22px; }
    </style>
</head>
<body>

    <div id="loadingOverlay" class="loader-container">
        <div class="loader"></div>
        <div class="loader-text" id="txtProcessing">PROCESSING...</div>
    </div>

    <div class="header-container">
        <h1 class="main-title" id="txt-title">Free Fire Patch Tracker</h1>
        <div class="sub-title" id="txt-by">Made By King of Games</div>
        <div class="lang-toggle-btn" onclick="toggleLanguage()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
            <span id="txt-lang-btn">Arabic</span>
        </div>
    </div>

    <div class="card">
        <div class="update-display">
            <img src="https://dl.dir.freefiremobile.com/common/test/official/FREE_FIRE_LOGO.PNG(2).png" alt="Free Fire" class="ff-logo">
            <div class="nav-arrows">
                <button class="btn-arrow" onclick="changeUpdate(1)" title="Next">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg>
                </button>
                <button class="btn-arrow" id="btn-prev" onclick="changeUpdate(-1)" title="Prev">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
            </div>
            <div class="version-tag" id="ob-version">OB--</div>
        </div>

        <div class="countdown-grid">
            <div class="time-box"><span class="time-val" id="d-days">00</span><span class="time-label" id="lbl-days">Days</span></div>
            <div class="time-box"><span class="time-val" id="d-hours">00</span><span class="time-label" id="lbl-hours">Hours</span></div>
            <div class="time-box"><span class="time-val" id="d-mins">00</span><span class="time-label" id="lbl-mins">Mins</span></div>
            <div class="time-box"><span class="time-val" id="d-secs">00</span><span class="time-label" id="lbl-secs">Secs</span></div>
        </div>

        <div id="download-section" class="download-section"></div>

        <div class="local-info" id="local-date-box">--</div>
    </div>

    <div class="note-box" id="txt-note">
        Note: Calculated patch dates are highly accurate but remain subject to change if officials decide to deploy early or late.
    </div>

    <div class="social-footer">
        <a href="https://www.instagram.com/_kingofgames02" target="_blank" class="social-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        </a>
        <a href="https://t.me/FF_MENA_Updates" target="_blank" class="social-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </a>
        <a href="https://linktr.ee/KingofGames02" target="_blank" class="social-btn">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="m13.73635 5.85251 4.00467-4.11665 2.3248 2.3808-4.20064 4.00466h5.9085v3.30473h-5.9365l4.22865 4.10766-2.3248 2.3338L12.0005 12.099l-5.74052 5.76852-2.3248-2.3248 4.22864-4.10766h-5.9375V8.12132h5.9085L3.93417 4.11666l2.3248-2.3808 4.00468 4.11665V0h3.4727zm-3.4727 10.30614h3.4727V24h-3.4727z"/></svg>
        </a>
    </div>

<script>
    const START_OB = 54;
    const START_DATE = new Date("2026-06-24T06:30:00+03:00");
    
    let baseUpcomingOB = 54;
    let currentViewOB = 54;
    let currentLang = 'en';
    let timer;

    const langDict = {
        en: { 
            title: "Free Fire Patch Tracker", by: "Made By King of Games", btnLang: "Arabic", 
            days: "Days", hours: "Hours", mins: "Mins", secs: "Secs", info: "Scheduled on:",
            note: "Note: Calculated patch dates are highly accurate but remain subject to change if officials decide to deploy early or late.",
            processing: "PROCESSING..."
        },
        ar: { 
            title: "متتبع تحديثات فري فاير", by: "تطوير King of Games", btnLang: "English", 
            days: "أيام", hours: "ساعات", mins: "دقائق", secs: "ثواني", info: "الموعد المقرر:",
            note: "ملاحظة: تواريخ التحديثات المحسوبة دقيقة للغاية ولكنها تظل عرضة للتغيير في حال قرر المسؤولون الإطلاق مبكراً أو متأخراً.",
            processing: "جاري المعالجة..."
        }
    };

    function isIOS() {
        return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    }

    function setupDownloadLinks() {
        const dlSection = document.getElementById('download-section');
        dlSection.innerHTML = '';
        
        let links = [];
        if (isIOS()) {
            links = [
                { name: 'Free Fire', url: 'https://apps.apple.com/eg/app/id1300146617' },
                { name: 'Free Fire MAX', url: 'https://apps.apple.com/eg/app/id1480516829' }
            ];
        } else {
            links = [
                { name: 'Free Fire', url: 'https://play.google.com/store/apps/details?id=com.dts.freefireth' },
                { name: 'Free Fire Max', url: 'https://play.google.com/store/apps/details?id=com.dts.freefiremax' },
                { name: 'Free Fire Normal APK', url: 'https://dl.cdn.freefiremobile.com/live/package/FreeFire.apk' }
            ];
        }

        const iconSvg = `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`;

        links.forEach(link => {
            const btn = document.createElement('a');
            btn.href = link.url;
            btn.target = '_blank';
            btn.className = 'btn-download';
            btn.innerHTML = `${iconSvg} <span>${link.name}</span>`;
            dlSection.appendChild(btn);
        });
    }

    function getUpdateDate(obNum) {
        let date = new Date(START_DATE.getTime());
        for (let i = 55; i <= obNum; i++) {
            let days = 77;
            if (i === 55) days = 84;
            else if (i === 56) days = 70;
            date.setDate(date.getDate() + days);
        }
        return date;
    }

    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.opacity = '0';
        setTimeout(() => overlay.classList.add('hidden'), 400);
    }

    function init() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('lang') === 'ar') {
            currentLang = 'ar';
            document.documentElement.dir = 'rtl';
        }
        
        document.getElementById('txtProcessing').innerText = langDict[currentLang].processing;

        setupDownloadLinks();

        const now = new Date();
        while (getUpdateDate(baseUpcomingOB).getTime() + (48 * 60 * 60 * 1000) < now.getTime()) {
            baseUpcomingOB++;
        }
        currentViewOB = baseUpcomingOB;

        applyLang();
        startTracker();
        
        setTimeout(hideLoading, 600);
    }

    function changeUpdate(step) {
        const targetOB = currentViewOB + step;
        if (targetOB >= baseUpcomingOB) {
            currentViewOB = targetOB;
            startTracker();
        }
    }

    function startTracker() {
        if (timer) clearInterval(timer);
        const targetDate = getUpdateDate(currentViewOB);
        
        document.getElementById('ob-version').innerText = `OB${currentViewOB}`;
        
        const prevBtn = document.getElementById('btn-prev');
        if (currentViewOB === baseUpcomingOB) {
            prevBtn.style.visibility = 'hidden';
            prevBtn.style.opacity = '0';
        } else {
            prevBtn.style.visibility = 'visible';
            prevBtn.style.opacity = '1';
        }
        
        const t = langDict[currentLang];
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        document.getElementById('local-date-box').innerHTML = `${t.info} <span class="highlight">${targetDate.toLocaleString(currentLang === 'ar' ? 'ar-EG' : 'en-US', options)}</span>`;

        updateClock(targetDate);
        timer = setInterval(() => updateClock(targetDate), 1000);
    }

    function updateClock(target) {
        const diff = target - new Date();
        const dlSection = document.getElementById('download-section');
        
        if (diff <= 0) { 
            setVals(0,0,0,0); 
            const isWithin48h = Math.abs(diff) <= (48 * 60 * 60 * 1000);
            if (isWithin48h && currentViewOB === baseUpcomingOB) {
                dlSection.style.display = 'flex';
            } else {
                dlSection.style.display = 'none';
            }
            return; 
        } else {
            dlSection.style.display = 'none';
        }
        
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        setVals(d, h, m, s);
    }

    function setVals(d, h, m, s) {
        document.getElementById('d-days').innerText = String(d).padStart(2, '0');
        document.getElementById('d-hours').innerText = String(h).padStart(2, '0');
        document.getElementById('d-mins').innerText = String(m).padStart(2, '0');
        document.getElementById('d-secs').innerText = String(s).padStart(2, '0');
    }

    function toggleLanguage() {
        const newLang = currentLang === 'en' ? 'ar' : 'en';
        const url = new URL(window.location.href);
        url.searchParams.set('lang', newLang);
        window.location.href = url.href;
    }

    function applyLang() {
        const t = langDict[currentLang];
        document.getElementById('txt-title').innerText = t.title;
        document.getElementById('txt-by').innerText = t.by;
        document.getElementById('txt-lang-btn').innerText = t.btnLang;
        document.getElementById('lbl-days').innerText = t.days;
        document.getElementById('lbl-hours').innerText = t.hours;
        document.getElementById('lbl-mins').innerText = t.mins;
        document.getElementById('lbl-secs').innerText = t.secs;
        document.getElementById('txt-note').innerText = t.note;
        document.getElementById('txtProcessing').innerText = t.processing;
    }

    window.onload = init;
</script>
</body>
</html>
